<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Halley Experience</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/images/ico.png" />
  <link rel="apple-touch-icon" href="assets/images/ico.png" />

  <!-- Social / Instagram bio preview -->
  <meta property="og:title" content="Halley Experience" />
  <meta property="og:description" content="One Small Step…" />
  <meta property="og:image" content="assets/images/img3.jpg" />
  <meta property="og:type" content="website" />
  <meta name="theme-color" content="#000000" />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar" aria-label="HALLEY">
    <img class="navbar__logo" src="assets/images/HALLEYlogo.png" alt="HALLEY" draggable="false" />
  </nav>

  <main class="stage" aria-label="HALLEY">
    <div class="frame">
      <img class="hero" src="assets/images/img3.jpg" alt="" draggable="false" />
      <!-- B&W + glitch spotlight that follows the cursor (drawn in JS) -->
      <canvas class="bw-canvas" id="bwCanvas"></canvas>
      <div class="vignette"></div>
    </div>

    <!-- Centered call-to-action button -->
    <a
      class="cta"
      href="https://www.instagram.com/halley.experience?igsh=MThmN3BqaTlxZTRxdw=="
      target="_blank"
      rel="noopener"
    >One Small Step…</a>
  </main>

  <!-- Looping soundtrack: autoplays muted (allowed everywhere),
       then un-mutes on the first user gesture. -->
  <audio id="track" src="assets/audio/One Small Step, One Giant Leap.mp3" loop autoplay muted playsinline preload="auto"></audio>

  <!-- Footer -->
  <footer class="footer">
    <span class="footer__brand">Halley Experience 2026</span>
    <nav class="footer__social" aria-label="Redes sociales">
      <!-- Instagram -->
      <a href="https://www.instagram.com/halley.experience?igsh=MThmN3BqaTlxZTRxdw==" target="_blank" rel="noopener" aria-label="Instagram">

        </svg>
      </a>
      <!-- TikTok -->
      <a href="https://www.tiktok.com/@halley.experience" target="_blank" rel="noopener" aria-label="TikTok">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64c.3 0 .59.05.86.13V9.4a6.84 6.84 0 0 0-.86-.05A6.33 6.33 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1.04-.1z"/>

        </svg>
      </a>
    </nav>
  </footer>

  <!-- Minimal play/pause control, just above the footer -->
  <button id="player" class="player" type="button" aria-label="Play music" aria-pressed="false">
    <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M8 5v14l11-7z"/>
    </svg>
    <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M6 5h4v14H6zM14 5h4v14h-4z"/>
    </svg>
  </button>

  <!-- Film grain overlay (drawn in JS) -->
  <canvas class="grain" id="grain" aria-hidden="true"></canvas>

  <script src="js/spotlight.js"></script>
  <script src="js/grain.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
